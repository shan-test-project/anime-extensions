name: Build AniNeko APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/en/anineko/**'

permissions:
  contents: read

jobs:
  build:
    name: Build AniNeko
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Generate debug signing key
        run: |
          keytool -genkeypair -v \
            -keystore signingkey.jks \
            -alias key0 \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=AniNeko, OU=Extensions, O=AniNeko, L=Unknown, ST=Unknown, C=US"
          echo "KEY_STORE_PASSWORD=android" >> $GITHUB_ENV
          echo "ALIAS=key0" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AniNeko APK
        run: ./gradlew :src:en:anineko:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AniNeko-APK
          path: src/en/anineko/build/outputs/apk/release/*.apk
          if-no-files-found: error
